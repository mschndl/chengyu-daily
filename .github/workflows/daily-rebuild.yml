name: Daily Rebuild

on:
  schedule:
    - cron: '0 0 * * *'  # midnight UTC every day
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"